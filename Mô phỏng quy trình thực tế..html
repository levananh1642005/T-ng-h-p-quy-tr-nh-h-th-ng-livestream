<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Scenario Walkthrough — Shop X · Váy hoa nhí V1</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-page:        #0f1117;
    --bg-primary:     #1a1d27;
    --bg-secondary:   #23273a;
    --bg-tertiary:    #2c3044;

    --text-primary:   #e8e6f0;
    --text-secondary: #9b99b0;
    --text-tertiary:  #5f5e7a;

    --border-light:   rgba(255,255,255,0.07);
    --border-medium:  rgba(255,255,255,0.13);
    --border-strong:  rgba(255,255,255,0.22);

    --blue-bg:   #0d2844;
    --blue-text: #7ec4f8;
    --blue-bdr:  #1e5a9c;

    --green-bg:  #0c2a1a;
    --green-text:#5dd68c;
    --green-bdr: #1a6b3a;

    --amber-bg:  #2a1e06;
    --amber-text:#f5be4a;
    --amber-bdr: #7a540f;

    --red-bg:    #2a0d0d;
    --red-text:  #f77c7c;
    --red-bdr:   #7a2222;

    --purple-bg:  #1a1640;
    --purple-text:#b8b0f0;
    --purple-bdr: #4a44a0;

    --teal-bg:   #082a22;
    --teal-text: #4ecfb0;
    --teal-bdr:  #156b52;

    --mono: 'Courier New', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
  }

  body {
    background: var(--bg-page);
    color: var(--text-primary);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 32px 16px;
  }

  .container {
    max-width: 780px;
    margin: 0 auto;
  }

  /* ── Header ── */
  .page-header { margin-bottom: 28px; }
  .page-eyebrow {
    font-size: 11px; font-weight: 600; letter-spacing: .08em;
    text-transform: uppercase; color: var(--text-tertiary);
    margin-bottom: 6px;
  }
  .page-title {
    font-size: 22px; font-weight: 600; color: var(--text-primary);
    margin-bottom: 4px;
  }
  .page-sub { font-size: 13px; color: var(--text-secondary); }

  /* ── Step nav ── */
  .step-nav {
    display: flex; align-items: center; gap: 4px;
    flex-wrap: nowrap; margin-bottom: 24px;
    overflow-x: auto; padding-bottom: 4px;
  }
  .step-dot {
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; cursor: pointer; flex-shrink: 0;
    border: 1px solid var(--border-medium);
    color: var(--text-secondary);
    background: var(--bg-secondary);
    transition: all .2s; user-select: none;
  }
  .step-dot:hover { border-color: var(--border-strong); color: var(--text-primary); }
  .step-dot.active {
    background: var(--blue-bg); color: var(--blue-text);
    border-color: var(--blue-bdr);
  }
  .step-dot.done {
    background: var(--green-bg); color: var(--green-text);
    border-color: var(--green-bdr); font-size: 13px;
  }
  .step-line { flex: 1; height: 1px; background: var(--border-light); min-width: 6px; }

  /* ── Step card ── */
  .step-card {
    background: var(--bg-primary);
    border: 1px solid var(--border-medium);
    border-radius: var(--radius-lg);
    padding: 22px 24px;
    margin-bottom: 16px;
  }
  .step-header { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 18px; }
  .step-num {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; flex-shrink: 0;
  }
  .step-title { font-size: 16px; font-weight: 600; color: var(--text-primary); margin-bottom: 5px; }
  .step-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .module-tag {
    display: inline-block; font-size: 10px; font-weight: 600;
    padding: 2px 8px; border-radius: 4px;
    background: var(--bg-tertiary); color: var(--text-secondary);
    border: 1px solid var(--border-light);
  }
  .step-time { font-size: 12px; color: var(--text-tertiary); }

  /* ── Badges ── */
  .badge {
    display: inline-block; font-size: 11px; font-weight: 600;
    padding: 3px 10px; border-radius: 4px;
  }
  .badge-success { background: var(--green-bg);  color: var(--green-text);  border: 1px solid var(--green-bdr); }
  .badge-info    { background: var(--blue-bg);   color: var(--blue-text);   border: 1px solid var(--blue-bdr); }
  .badge-warn    { background: var(--amber-bg);  color: var(--amber-text);  border: 1px solid var(--amber-bdr); }
  .badge-danger  { background: var(--red-bg);    color: var(--red-text);    border: 1px solid var(--red-bdr); }
  .badge-purple  { background: var(--purple-bg); color: var(--purple-text); border: 1px solid var(--purple-bdr); }

  /* ── Data boxes ── */
  .data-row { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
  .data-box {
    flex: 1; min-width: 130px;
    background: var(--bg-secondary);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-md); padding: 12px 14px;
  }
  .data-lbl { font-size: 11px; color: var(--text-tertiary); margin-bottom: 4px; }
  .data-val { font-size: 15px; font-weight: 600; color: var(--text-primary); }
  .data-sub { font-size: 11px; color: var(--text-secondary); margin-top: 3px; }

  /* ── Comment bubble ── */
  .comment-bubble {
    background: var(--bg-secondary);
    border: 1px solid var(--border-medium);
    border-radius: 14px 14px 14px 3px;
    padding: 12px 16px; display: inline-block;
    max-width: 420px; margin-bottom: 10px;
  }
  .comment-text { font-size: 14px; color: var(--text-primary); line-height: 1.5; }
  .comment-meta { font-size: 11px; color: var(--text-tertiary); margin-top: 5px; }

  /* ── System log ── */
  .system-log {
    font-family: var(--mono); font-size: 12px;
    color: var(--text-secondary);
    background: #0a0c12;
    border: 1px solid var(--border-light);
    border-left: 3px solid var(--blue-bdr);
    border-radius: var(--radius-md);
    padding: 12px 16px; line-height: 1.9;
    margin-bottom: 12px;
  }
  .log-ok   { color: var(--green-text); }
  .log-warn { color: var(--amber-text); }
  .log-info { color: var(--blue-text); }

  /* ── Order card ── */
  .order-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border-medium);
    border-radius: var(--radius-lg); padding: 16px 18px;
    margin-bottom: 12px;
  }
  .order-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 7px 0; border-bottom: 1px solid var(--border-light);
    font-size: 13px;
  }
  .order-row:last-child { border-bottom: none; padding-bottom: 0; }
  .order-lbl { color: var(--text-secondary); }
  .order-val { font-weight: 600; color: var(--text-primary); }

  /* ── Timeline ── */
  .timeline { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
  .tl-row { display: flex; align-items: center; gap: 12px; }
  .tl-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .tl-dot.done    { background: var(--green-text); }
  .tl-dot.active  { background: var(--blue-text); }
  .tl-dot.pending { background: var(--border-medium); }
  .tl-text { font-size: 13px; color: var(--text-primary); }
  .tl-text.pending { color: var(--text-tertiary); }

  /* ── Success box ── */
  .success-box {
    background: var(--green-bg);
    border: 1px solid var(--green-bdr);
    border-radius: var(--radius-md);
    padding: 12px 16px; margin-top: 12px;
  }
  .success-box-title { font-size: 13px; font-weight: 600; color: var(--green-text); margin-bottom: 4px; }
  .success-box-text  { font-size: 12px; color: var(--green-text); line-height: 1.5; opacity: .85; }

  /* ── Nav buttons ── */
  .nav-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 4px;
  }
  .nav-btn {
    background: var(--bg-secondary);
    border: 1px solid var(--border-medium);
    color: var(--text-primary);
    padding: 9px 20px; border-radius: var(--radius-md);
    font-size: 13px; font-weight: 500; cursor: pointer;
    transition: background .15s, border-color .15s;
  }
  .nav-btn:hover:not(:disabled) {
    background: var(--bg-tertiary); border-color: var(--border-strong);
  }
  .nav-btn:disabled { opacity: .35; cursor: not-allowed; }
  .nav-info { font-size: 12px; color: var(--text-tertiary); text-align: center; }

  /* ── Section label ── */
  .sec-lbl {
    font-size: 11px; font-weight: 600; letter-spacing: .06em;
    text-transform: uppercase; color: var(--text-tertiary);
    margin-bottom: 8px;
  }

  /* ── Prose description ── */
  .prose-box {
    border-top: 1px solid var(--border-light);
    margin-top: 18px; padding-top: 16px;
  }
  .prose-label {
    font-size: 10px; font-weight: 600; letter-spacing: .08em;
    text-transform: uppercase; color: var(--text-tertiary);
    margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
  }
  .prose-label::after {
    content:''; flex:1; height:1px; background: var(--border-light);
  }
  .prose-text {
    font-size: 13.5px; color: var(--text-secondary);
    line-height: 1.8; font-weight: 400;
  }
  .prose-text em { color: var(--text-primary); font-style: italic; }
  .prose-text strong { color: var(--text-primary); font-weight: 600; }
  .prose-text .hi-blue   { color: var(--blue-text); font-weight: 500; }
  .prose-text .hi-green  { color: var(--green-text); font-weight: 500; }
  .prose-text .hi-amber  { color: var(--amber-text); font-weight: 500; }
  .prose-text .hi-purple { color: var(--purple-text); font-weight: 500; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-medium); border-radius: 3px; }
</style>
</head>
<body>
<div class="container">

  <div class="page-header">
    <div class="page-eyebrow">Scenario Walkthrough — Hệ thống quản lý đơn hàng Livestream</div>
    <div class="page-title">Shop X · Váy hoa nhí V1</div>

</div>

let current = 0;

function renderNav() {
  const nav = document.getElementById('stepNav');
  nav.innerHTML = '';
  STEPS.forEach((s, i) => {
    if (i > 0) {
      const ln = document.createElement('div');
      ln.className = 'step-line';
      nav.appendChild(ln);
    }
    const dot = document.createElement('div');
    dot.className = 'step-dot' + (i === current ? ' active' : i < current ? ' done' : '');
    dot.textContent = i < current ? '✓' : (i + 1);
    dot.title = s.label;
    dot.onclick = (idx => () => { current = idx; render(); })(i);
    nav.appendChild(dot);
  });
}

function renderContent() {
  const s = STEPS[current];
  document.getElementById('stepContent').innerHTML = `
    <div class="step-card">
      <div class="step-header">
        <div class="step-num" style="background:${s.numBg};color:${s.numColor}">${current + 1}</div>
        <div style="flex:1">
          <div class="step-title">${s.title}</div>
          <div class="step-meta" style="margin-top:6px">
            <span class="module-tag">${s.module}</span>
            <span class="step-time">${s.time}</span>
            ${s.badge}
          </div>
        </div>
      </div>
      ${s.html}
    </div>`;
}

function renderButtons() {
  document.getElementById('btnPrev').disabled = current === 0;
  document.getElementById('btnNext').disabled = current === STEPS.length - 1;
  document.getElementById('navInfo').textContent =
    `Bước ${current + 1} / ${STEPS.length} — ${STEPS[current].label}`;
}

function render() { renderNav(); renderContent(); renderButtons(); }
function nextStep() { if (current < STEPS.length - 1) { current++; render(); } }
function prevStep() { if (current > 0) { current--; render(); } }

render();
</script>
